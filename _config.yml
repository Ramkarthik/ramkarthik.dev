# About Section
# about_title: About Me (Use this to override about section title)
about_profile_image: images/ram.jpg
about_content: | # this will include new lines to allow paragraphs
  Hi, my name is Ramkarthik Krishnamurthy. I'm a software engineer with over 7 years experience. I currently live in Salt Lake City, Utah. I primarily work with <mark>C#</mark>, <mark>ASP .NET</mark> (and I love <mark>dotnet core</mark>), <mark>SQL</mark> and <mark>JavaScript</mark>. For data access, I have used both <mark>ADO .NET</mark> and <mark>EntityFramework</mark>. I have experience creating <mark>MVC</mark>, <mark>Web API</mark>, <mark>WCF</mark>, <mark>class library</mark> and <mark>console</mark> applications. Apart from this, I have also worked with <mark>SignalR</mark> and <mark>WPF</mark>.
  As for CI/CD tools, I have used <mark>Jenkins</mark>, <mark>Docker</mark>, <mark>AppVeyor</mark> and <mark>Azure Pipelines</mark>.

  There are some things I really enjoy and look for at a workplace:
  - Working with a team to create solid and easy to use products for users
  - Learning new things and taking more responsibilites
  - Automating stuff that can be automated
  - Writing lot of tests (I use <mark>MSTest</mark> and <mark>Xunit</mark>)
  - Frequent deployments

