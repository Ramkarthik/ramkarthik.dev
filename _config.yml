more_title: When I'm not programming
more_content: | # this will include new lines to allow paragraphs
  I play soccer regularly and watch English Premier League (Manchester United fan). I also like to write. While I don't publish most of the things that I write, I do publish some technical articles and thoughts on [my blog](https://kramkarthik.com).

  I learnt [Carnatic music](https://en.wikiquote.org/wiki/Carnatic_music) for two years and have won some competitions when I was in school. But once I went to college, I got more into soccer and stopped taking Carnatic lessons.

  Apart from these, I love to read a lot. I mostly read about philosophy, self-help, culture and business.

